<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <style>
      .bg {
        fill: #0a0a1a;
      }
      .initial-text {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 140px;
        font-weight: bold;
        letter-spacing: 4px;
        text-anchor: middle;
      }
      .color-white {
        fill: #ffffff;
      }
      .color-gold {
        fill: #d4af37;
      }
      .border-ring {
        fill: none;
        stroke: #d4af37;
        stroke-width: 4;
        opacity: 0.4;
      }
      .border-inner {
        fill: none;
        stroke: #ffffff;
        stroke-width: 1;
        opacity: 0.15;
      }
      .favicon-subtext {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-size: 16px;
        fill: #ffffff;
        letter-spacing: 7px;
        text-anchor: middle;
        text-transform: uppercase;
        opacity: 0.8;
      }
    </style>
  </defs>
  <rect width="512" height="512" rx="32" class="bg" />
  
  <circle cx="256" cy="256" r="220" class="border-ring" />
  <circle cx="256" cy="256" r="208" class="border-inner" />
  
  <text x="256" y="285" class="initial-text">
    <tspan class="color-white">B</tspan>
    <tspan class="color-gold">N</tspan>
    <tspan class="color-white">G</tspan>
  </text>
  
  <line x1="180" y1="330" x2="332" y2="330" stroke="#d4af37" stroke-width="2" opacity="0.7" />
  
  <text x="260" y="365" class="favicon-subtext">BANGKOK</text>
</svg>
